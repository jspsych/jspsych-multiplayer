<!DOCTYPE html>
<html>
  <head>
    <title>Multiplayer Draw Room — jsPsych multiplayer</title>
    <!-- jsPsych core MUST carry the multiplayer API (jsPsych#3694), which is not yet in a release.
         Until it merges, load the PR's preview build from jsDelivr instead of the published `jspsych`.
         This URL is pinned to the same #3694 preview SHA as chat-room.html. A SHA-pinned URL keeps
         loading indefinitely (it never 404s); what goes stale is the #3694 API it was pinned against,
         so if the demo misbehaves against a newer #3694, re-pin — see examples/README.md "Running it". -->
    <script src="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@c43b3a1f285ef2d899cd43960c889a4a9d630dc9/packages/jspsych/dist/index.browser.min.js"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response"></script>
    <!-- The multiplayer packages resolve from the sibling packages' built dist/ in this repo (run
         `npm install && npm run build` from the repo root first — dist/ is gitignored). Once they are
         published, load them from a CDN instead, e.g.
           <script src="https://unpkg.com/@jspsych-multiplayer/plugin-multiplayer-draw"></script> -->
    <!-- The `?v=` query is a cache-buster: bump it after rebuilding the packages so the browser is
         forced to re-fetch the new bundle instead of serving a stale cached copy. -->
    <script src="../packages/adapter-multiplayer-local/dist/index.browser.min.js?v=3"></script>
    <script src="../packages/plugin-multiplayer-sync/dist/index.browser.min.js?v=3"></script>
    <script src="../packages/plugin-multiplayer-draw/dist/index.browser.min.js?v=3"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@c43b3a1f285ef2d899cd43960c889a4a9d630dc9/packages/jspsych/css/jspsych.css"
    />
    <style>
      /* The draw plugin ships no CSS of its own (matching the other multiplayer plugins), so this
         demo adds just enough to make the canvas and toolbar visible and usable. */
      .jspsych-multiplayer-draw-toolbar {
        display: flex;
        gap: 6px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .jspsych-multiplayer-draw-color,
      .jspsych-multiplayer-draw-size {
        width: 28px;
        height: 28px;
        border: 2px solid #ccc;
        border-radius: 50%;
        cursor: pointer;
        padding: 0;
        /* Center the (variable-size) brush dot and keep every button on the same baseline — without
           this, the largest dot's bigger font-size pushes its button up and off-center. */
        display: inline-flex;
        align-items: center;
        justify-content: center;
        vertical-align: middle;
        overflow: hidden;
        box-sizing: border-box;
      }
      .jspsych-multiplayer-draw-color.is-selected,
      .jspsych-multiplayer-draw-size.is-selected,
      .jspsych-multiplayer-draw-pen.is-selected,
      .jspsych-multiplayer-draw-eraser.is-selected {
        border-color: #1971c2;
        box-shadow: 0 0 0 2px rgba(25, 113, 194, 0.3);
      }
      .jspsych-multiplayer-draw-pen,
      .jspsych-multiplayer-draw-eraser,
      .jspsych-multiplayer-draw-undo,
      .jspsych-multiplayer-draw-redo {
        padding: 4px 12px;
        cursor: pointer;
      }
      .jspsych-multiplayer-draw-undo:disabled,
      .jspsych-multiplayer-draw-redo:disabled {
        cursor: default;
        opacity: 0.6;
      }
      .jspsych-multiplayer-draw-canvas-wrap {
        width: 640px;
        height: 480px;
        max-width: 90vw;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .jspsych-multiplayer-draw-canvas {
        border: 1px solid #333;
        background: #fff;
        touch-action: none; /* let the pointer draw instead of scrolling/panning on touch devices */
      }
      .jspsych-multiplayer-draw-roster {
        text-align: center;
        color: #666;
        font-size: 0.9em;
        margin-bottom: 6px;
      }
      .jspsych-multiplayer-draw-error {
        text-align: center;
        color: #c92a2a;
        margin-top: 6px;
      }
      .draw-room-instructions {
        text-align: center;
        color: #555;
        font-size: 0.9em;
        margin: -4px 0 8px;
      }
      .draw-room-done-button {
        display: block;
        margin: 12px auto 0;
        padding: 4px 12px;
        cursor: pointer;
      }
      .draw-room-done-button:disabled {
        cursor: default;
        opacity: 0.6;
      }
      .drawing-result img {
        display: block;
        max-width: 90vw;
        border: 1px solid #333;
        margin: 12px auto;
      }
      .drawing-result a.download-link {
        display: inline-block;
        margin-bottom: 8px;
      }
    </style>
  </head>

  <body></body>
  <script>
    // ===============================================================================================
    // Multiplayer Draw Room — a real-time demo for the jsPsych multiplayer packages.
    //
    // Participants pick a display name, wait in a lobby until enough people have joined, then draw
    // TOGETHER on one shared canvas for a fixed time. It is the highest-rate demo of the multiplayer
    // API's `subscribe` primitive: where the chat room pushes once per message, the draw plugin pushes
    // continuously (throttled + point-decimated) while a stroke is active. It composes three packages:
    //   • adapter-multiplayer-local — the network backend. localStorage + cross-tab signalling, so the
    //                                 whole thing runs by OPENING TWO BROWSER TABS — no server.
    //   • plugin-multiplayer-sync   — the lobby: push your name, wait until MIN_PLAYERS are present.
    //   • plugin-multiplayer-draw   — the shared canvas: pen/eraser, colors, brush sizes, and an undo
    //                                 that only ever removes THIS participant's own last stroke. The
    //                                 room stays open until DRAW_DURATION_MS elapses OR everyone
    //                                 clicks the demo's own "I'm done" button (see drawTrial below).
    //
    // -----------------------------------------------------------------------------------------------
    // ILLUSTRATIVE example. Like chat-room.html it needs no server, but connecting ANY adapter still
    // requires the multiplayer API from jsPsych#3694, which is not yet in a release. The local adapter
    // is same-origin, same-browser, same-machine — a development/demo tool, NOT for data collection.
    // ===============================================================================================

    // How many participants must be present before the lobby opens the draw room.
    const MIN_PLAYERS = 2;
    // How long the draw room stays open, in milliseconds.
    const DRAW_DURATION_MS = 5 * 60 * 1000;

    const jsPsych = initJsPsych();

    // Connecting the adapter is the only network setup the timeline needs. persistParticipant keeps
    // this tab's participant id in sessionStorage, so a mid-lobby refresh rejoins as the SAME
    // participant instead of leaving a stale "ghost" slot that would falsely satisfy the lobby.
    const localAdapter = new jsPsychAdapterMultiplayerLocal({ persistParticipant: true });

    let myName = "";

    // 1) Ask for a display name.
    const nameTrial = {
      type: jsPsychSurveyText,
      questions: [{ prompt: "Choose a display name:", required: true, name: "name" }],
      on_finish: (data) => {
        myName = (data.response.name || "").trim() || "Anonymous";
      },
    };

    // 2) Lobby: publish our name + join time, then wait until enough named players are present.
    const lobbyTrial = {
      type: jsPsychMultiplayerSync,
      push_data: () => ({ name: myName, joinedAt: Date.now() }),
      // NB: the sync plugin's waiting-HTML parameter is `message`, not `prompt`.
      message: `<p>Waiting for at least ${MIN_PLAYERS} players to join…</p>
               <p>Open this page in another tab (keep the <code>?mp_session=</code> in the URL) to add a player.</p>`,
      wait_for: (group) =>
        Object.values(group).filter((entry) => entry && entry.name).length >= MIN_PLAYERS,
    };

    // 3) The shared canvas. roster_label turns each participant id into the display name that the
    //    lobby pushed into that participant's slot (falling back to a generic label), so the roster
    //    reads "Present: Alice, Bob" instead of raw ids. Our own entry reads "You".
    //
    // The room closes for EVERYONE as soon as either (a) DRAW_DURATION_MS elapses, or (b) every
    // participant present has clicked "I'm done". (b) is NOT the plugin's built-in
    // `end_button_label` — that button only ends the clicking participant's own trial (see
    // end_when below), so this demo instead builds its own "I'm done" button that pushes a
    // `draw_done` flag into the clicker's own group-session slot, and uses `end_when` to close the
    // room once every participant's flag is set — the same "wait for everyone" pattern the sync
    // plugin's lobby uses, just phrased as an exit condition instead of an entry one.
    let drawingDataUrl = null;
    let canvasRef = null;
    const drawTrial = {
      type: jsPsychMultiplayerDraw,
      prompt: `<p>You're in! Draw together on the shared canvas below.</p>
               <p class="draw-room-instructions">You have ${
                 DRAW_DURATION_MS / 60000
               } minutes total. The room closes early for everyone once every participant clicks "I'm done".</p>`,
      duration: DRAW_DURATION_MS,
      show_roster: true,
      // Also shows each participant's "I'm done" status (✓), since the room only closes once
      // everyone has clicked it (see end_when below) — participants should be able to see who
      // they're still waiting on.
      roster_label: (participantId, group) => {
        const entry = group[participantId];
        const name =
          participantId === localAdapter.participantId
            ? "You"
            : (entry && entry.name) || "A participant";
        return entry && entry.draw_done === true ? `${name} ✓` : name;
      },
      // Only participants who made it through the lobby (i.e. pushed a `name`) count toward "everyone
      // is done" — an as-yet-unnamed slot from a mid-lobby refresh shouldn't block the room forever.
      end_when: (group) => {
        const present = Object.values(group).filter((entry) => entry && entry.name);
        return present.length > 0 && present.every((entry) => entry.draw_done === true);
      },
      // Adds the demo's own "I'm done" button below the canvas (see the on_finish/on_load note
      // above) — deliberately NOT the plugin's `end_button_label`, which would end only the
      // clicker's own trial rather than coordinating with `end_when` above. Also grabs a direct
      // reference to the canvas element for on_finish below — see that callback's comment for why.
      on_load: () => {
        const wrap = jsPsych
          .getDisplayElement()
          .querySelector(".jspsych-multiplayer-draw-canvas-wrap");
        canvasRef = wrap.querySelector(".jspsych-multiplayer-draw-canvas");
        const button = document.createElement("button");
        button.type = "button";
        button.className = "draw-room-done-button";
        button.textContent = "I'm done";
        button.addEventListener("click", () => {
          const mine = jsPsych.pluginAPI.get(localAdapter.participantId) || {};
          jsPsych.pluginAPI.push({ ...mine, draw_done: true });
          button.disabled = true;
          button.textContent = "Waiting for others…";
        });
        wrap.after(button);
      },
      // Capture the final canvas as a PNG data URL for the wrap-up screen below. This is DEMO-side
      // logic, not a plugin feature — the plugin's job is syncing the canvas, not managing a
      // download UX (filename conventions, browser quirks, etc. an experimenter may not want at
      // all).
      //
      // IMPORTANT: jsPsych clears display_element.innerHTML BEFORE firing on_finish (see
      // TimelineNode's executeTrial -> cleanupTrial, called ahead of the awaited onFinish() in
      // run()), so querying the DOM for the canvas here always returns null. Use the direct element
      // reference `canvasRef` saved in on_load instead — a canvas keeps its rendered pixel buffer
      // even after being detached from the document, so toDataURL() on the saved reference still
      // works here.
      //
      // The plugin's canvas is transparent by default (its on-screen white is only CSS
      // `background: #fff`, not real pixel data), so exporting it directly would produce a PNG with
      // transparent gaps wherever nothing was drawn. Composite onto an opaque white offscreen canvas
      // first so the downloaded/displayed image always has a solid background.
      on_finish: () => {
        if (!canvasRef) {
          drawingDataUrl = null;
          return;
        }
        const flattened = document.createElement("canvas");
        flattened.width = canvasRef.width;
        flattened.height = canvasRef.height;
        const ctx = flattened.getContext("2d");
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, flattened.width, flattened.height);
        ctx.drawImage(canvasRef, 0, 0);
        drawingDataUrl = flattened.toDataURL("image/png");
      },
    };

    // 4) Wrap-up screen: show the finished drawing and offer to download it as a PNG.
    const doneTrial = {
      type: jsPsychHtmlButtonResponse,
      choices: ["Finish"],
      stimulus: () => {
        const draw = jsPsych.data.get().filter({ trial_type: "multiplayer-draw" }).values()[0] || {};
        const total = draw.stroke_count ?? 0;
        const mine = draw.strokes_drawn ?? 0;
        const image = drawingDataUrl
          ? `<div class="drawing-result">
               <a class="download-link" href="${drawingDataUrl}" download="drawing.png">Download drawing (PNG)</a>
               <img src="${drawingDataUrl}" alt="The finished collaborative drawing" />
             </div>`
          : "";
        return `<h2>Thanks for drawing!</h2>
                <p>${total} stroke${total === 1 ? "" : "s"} were drawn in total; you drew ${mine}.</p>
                ${image}`;
      },
    };

    // Connect the backend, then run. Everything above is backend-agnostic — swapping the adapter on
    // the line below is the only change needed to move from local two-tab testing to JATOS.
    jsPsych.pluginAPI.connect(localAdapter).then(() => {
      jsPsych.run([nameTrial, lobbyTrial, drawTrial, doneTrial]);
    });
  </script>
</html>
