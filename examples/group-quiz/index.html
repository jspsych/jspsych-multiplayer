<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Group Quiz (JATOS) — jsPsych multiplayer</title>
    <!-- jatos.js is injected by JATOS at runtime; it provides the group session + channel this
         experiment runs over. -->
    <script src="jatos.js"></script>
    <!-- jsPsych core MUST carry the multiplayer API (jsPsych#3694). The published `jspsych` on
         unpkg does not yet, so this loads it as a placeholder — swap in a build of #3694 to run. -->
    <script src="https://unpkg.com/jspsych"></script>
    <script src="https://unpkg.com/@jspsych/plugin-call-function"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response"></script>
    <!-- The two multiplayer packages. These resolve once the sibling packages are built in this
         repo; once they are published, load them from a CDN instead, e.g.
           <script src="https://unpkg.com/@jspsych-multiplayer/plugin-multiplayer-sync"></script> -->
    <script src="../../packages/adapter-multiplayer-jatos/dist/index.browser.min.js"></script>
    <script src="../../packages/plugin-multiplayer-sync/dist/index.browser.min.js"></script>
    <!-- Shared game protocol, then the answer key. `questions.js` is loaded HERE by both roles for
         convenience, but see the security note in the header comment below. -->
    <script src="protocol.js"></script>
    <script src="questions.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: sans-serif; background: #0f2b38; color: #fff; min-height: 100vh; }

      /* ── Selector ─────────────────────────────────────────── */
      #selector {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; min-height: 100vh; gap: 24px; padding: 24px;
      }
      #selector h1 { font-size: 3rem; letter-spacing: 2px; }
      #selector p  { opacity: 0.7; font-size: 1.1rem; }
      .role-btn {
        padding: 20px 48px; font-size: 1.3rem; font-weight: bold;
        border: none; border-radius: 12px; cursor: pointer; width: 220px;
      }
      #host-btn   { background: #0e7490; color: #fff; }
      #player-btn { background: #0f766e; color: #fff; }

      /* ── Host styles ──────────────────────────────────────── */
      #host-view {
        display: none; width: 100%; max-width: 900px;
        margin: 0 auto; padding: 24px;
      }
      .player-list { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
      .player-chip { background: #1e4558; border-radius: 8px; padding: 8px 16px; font-size: 1rem; }
      .question-text {
        font-size: 2rem; text-align: center; margin-bottom: 24px;
        background: #1e4558; border-radius: 12px; padding: 24px;
      }
      .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
      .answer-tile {
        padding: 20px; border-radius: 10px; font-size: 1.2rem;
        font-weight: bold; text-align: center; color: #fff;
      }
      .answer-tile.red    { background: #1d6fae; }
      .answer-tile.blue   { background: #b85c00; }
      .answer-tile.yellow { background: #6b3fae; }
      .answer-tile.green  { background: #1a7a52; }
      .answer-tile.correct-highlight { outline: 6px solid #fff; }
      .counter { font-size: 1.5rem; text-align: center; margin-bottom: 8px; }
      .timer   { font-size: 4rem; font-weight: bold; text-align: center; margin-bottom: 24px; }
      .bar-chart { margin: 16px 0; }
      .bar-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
      .bar-label { width: 24px; text-align: center; font-size: 1.1rem; }
      .bar-track { flex: 1; background: rgba(255,255,255,0.15); border-radius: 4px; height: 28px; }
      .bar-fill  { height: 100%; border-radius: 4px; transition: width 0.4s; display: flex; align-items: center; padding-left: 8px; font-weight: bold; min-width: 2px; }
      .leaderboard-list { list-style: none; }
      .leaderboard-list li { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 20px; margin-bottom: 10px; font-size: 1.2rem; }
      .rank  { font-size: 1.5rem; font-weight: bold; width: 36px; }
      .score { margin-left: auto; font-weight: bold; }
      .ctrl-btn { padding: 14px 32px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; background: #fff; color: #0f2b38; }
      .ctrl-btn:hover { background: #e0e0f0; }
      .btn-row { display: flex; justify-content: center; gap: 16px; margin-top: 20px; }
      .podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; margin: 24px 0; }
      .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 8px; }
      .podium-block { width: 120px; background: rgba(255,255,255,0.2); border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; }
      .podium-name  { font-size: 1rem; text-align: center; }
      .podium-score { font-size: 0.9rem; opacity: 0.8; }

      /* ── Player (jsPsych) styles ──────────────────────────── */
      .jspsych-content { max-width: 600px; }
      .answer-grid-player { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
      .jspsych-btn.answer-btn {
        padding: 28px 12px; font-size: 1.1rem; font-weight: bold;
        border: none; border-radius: 10px; color: #fff; width: 100%;
      }
      .jspsych-btn.answer-btn.red    { background: #1d6fae; }
      .jspsych-btn.answer-btn.blue   { background: #b85c00; }
      .jspsych-btn.answer-btn.yellow { background: #6b3fae; }
      .jspsych-btn.answer-btn.green  { background: #1a7a52; }
      .result-correct { color: #1a7a52; font-size: 2rem; font-weight: bold; }
      .result-wrong   { color: #c0392b; font-size: 2rem; font-weight: bold; }
      .points-earned  { font-size: 1.3rem; margin-top: 8px; }
      .total-score    { font-size: 1.1rem; opacity: 0.7; margin-top: 4px; }
    </style>
  </head>
  <body>

    <!-- ── Role selector ─────────────────────────────────────── -->
    <div id="selector">
      <h1>Group Quiz</h1>
      <p>Are you running the game or playing?</p>
      <button class="role-btn" id="host-btn">🖥️ I'm the Host</button>
      <button class="role-btn" id="player-btn">📱 I'm a Player</button>
    </div>

    <!-- ── Host view (rendered by vanilla JS) ────────────────── -->
    <div id="host-view"></div>

    <script>
    // ===============================================================================================
    // Group Quiz — a live, Kahoot-style quiz on the jsPsych multiplayer packages.
    //
    // ONE link, two roles, chosen by the participant on the landing screen:
    //   • HOST   — the presenter screen. Vanilla JS driving `adapter-multiplayer-jatos` DIRECTLY
    //              (no jsPsych timeline): it reacts continuously to `subscribe`, and it is the one
    //              client that advances the game.
    //   • PLAYER — a phone. An ordinary jsPsych timeline whose every "wait for the host to advance"
    //              point is a single declarative `plugin-multiplayer-sync` barrier.
    //
    // This is the repo's demo of the ASYMMETRIC pattern: one authoritative driver plus many
    // followers, in contrast to `ultimatum-game-jatos.html`, where every client runs the same
    // timeline and coordination is by deterministic consensus (see plugin-multiplayer-role).
    //
    // Why it hand-rolls its leaderboard, timer, and answer buttons rather than composing this repo's
    // scoreboard/countdown/choice plugins: see docs/group-quiz-design.md. The short version is that
    // all three of those plugins coordinate *peer-to-peer* (min-across-slots consensus, all-players
    // barriers), while this game is host-authoritative — and the host view isn't a jsPsych timeline
    // at all, so it can't run plugins.
    //
    // -----------------------------------------------------------------------------------------------
    // ILLUSTRATIVE example — it shows how the packages fit together; it is NOT runnable from a single
    // browser tab today. To actually run it you need:
    //   1. a jsPsych core that includes the multiplayer API (jsPsych#3694), not yet in a release;
    //   2. the JATOS environment (so the `jatos` global and a group study exist); and
    //   3. at least two real participants in the same JATOS group (one Host + one or more Players).
    //
    // SECURITY NOTE: `questions.js` carries the answer key, and this page loads it for BOTH roles so
    // one file serves the whole demo. A player can therefore read the answers in devtools. That is
    // acceptable for a demo; for anything scored for real, serve the key only to the host (a separate
    // host-only component, or move correctness scoring server-side) — the protocol already keeps
    // correctness a host decision, published at `reveal` via `correctChoice`.
    //
    // Adapted from the author's group-quiz demo in jsPsych#3694 (MIT).
    // ===============================================================================================

    // Player names are typed by participants and interpolated into innerHTML below —
    // escape them so a player can't inject markup via their own display name.
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    jatos.onLoad(async () => {

      document.getElementById("host-btn").onclick   = () => startHost();
      document.getElementById("player-btn").onclick = () => startPlayer();

      // ════════════════════════════════════════════════════════
      //  HOST FLOW — vanilla JS, uses adapter directly
      // ════════════════════════════════════════════════════════
      async function startHost() {
        document.getElementById("selector").style.display   = "none";
        document.getElementById("host-view").style.display  = "block";

        const adapter = new jsPsychAdapterMultiplayerJatos();
        await adapter.connect();
        const hostId = adapter.participantId;

        let currentGroup = {};
        let countdownInterval = null;
        let revealScheduled   = false;

        await adapter.push({ role: "host", phase: PHASES.LOBBY, step: phaseStep(undefined, PHASES.LOBBY) });
        adapter.subscribe(group => { currentGroup = group; render(group); });

        // The raw adapter's subscribe() fires only on future updates, not the
        // current snapshot (replay is handled by MultiplayerAPI, not the adapter).
        // Render once now so players who joined before the host subscribed appear
        // immediately in the lobby.
        currentGroup = adapter.getAll();
        render(currentGroup);

        function render(group) {
          const state = group[hostId];
          if (!state) return;
          switch (state.phase) {
            case PHASES.LOBBY:       renderLobby(group);       break;
            case PHASES.QUESTION:    renderQuestion(group);    break;
            case PHASES.REVEAL:      renderReveal(group);      break;
            case PHASES.LEADERBOARD: renderLeaderboard(group); break;
            case PHASES.ENDED:       renderEnded(group);       break;
          }
        }

        function view() { return document.getElementById("host-view"); }

        function renderLobby(group) {
          const players = Object.values(group).filter(e => e?.role === "player");
          view().innerHTML = `
            <h1 style="text-align:center;margin-bottom:8px">Waiting for players…</h1>
            <p style="text-align:center;opacity:0.7;margin-bottom:16px">${players.length} joined</p>
            <div class="player-list">${players.map(p => `<div class="player-chip">${escapeHtml(p.name)}</div>`).join("")}</div>
            <div class="btn-row">
              <button class="ctrl-btn" id="startBtn" ${players.length === 0 ? "disabled" : ""}>Start Game</button>
            </div>`;
          document.getElementById("startBtn").onclick = startGame;
        }

        function renderQuestion(group) {
          const state   = group[hostId];
          const players = Object.values(group).filter(e => e?.role === "player");
          const answered = players.filter(p => p.answers?.[state.questionIndex] !== undefined).length;
          const colors  = ["red","blue","yellow","green"];
          const labels  = ["A","B","C","D"];

          view().innerHTML = `
            <p style="text-align:center;opacity:0.7;margin-bottom:8px">Question ${state.questionIndex + 1} of ${QUESTIONS.length}</p>
            <div class="question-text">${state.questionPrompt}</div>
            <div class="answer-grid">
              ${state.questionChoices.map((choice, idx) =>
                `<div class="answer-tile ${colors[idx]}">${labels[idx]}. ${choice}</div>`
              ).join("")}
            </div>
            <div class="counter">${answered} / ${players.length} answered</div>
            <div class="timer" id="timerDisplay"></div>`;

          if (players.length > 0 && answered >= players.length && !revealScheduled) {
            revealScheduled = true;
            advanceToReveal();
          }
          if (!countdownInterval) startCountdown(state);
        }

        function startCountdown(state) {
          clearInterval(countdownInterval);
          revealScheduled = false;
          const endTime = state.questionStartTime + state.questionDurationMs;
          countdownInterval = setInterval(() => {
            const secondsLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
            const display = document.getElementById("timerDisplay");
            if (display) display.textContent = secondsLeft;
            if (secondsLeft <= 0) {
              clearInterval(countdownInterval);
              countdownInterval = null;
              if (!revealScheduled) { revealScheduled = true; advanceToReveal(); }
            }
          }, 250);
        }

        function renderReveal(group) {
          clearInterval(countdownInterval);
          countdownInterval = null;
          const state   = group[hostId];
          const players = Object.values(group).filter(e => e?.role === "player");
          const colors  = ["red","blue","yellow","green"];
          const labels  = ["A","B","C","D"];
          const tally   = [0,0,0,0];
          players.forEach(p => {
            const ans = p.answers?.[state.questionIndex];
            if (ans !== undefined) tally[ans.choice]++;
          });
          const maxTally = Math.max(1, ...tally);

          view().innerHTML = `
            <div class="question-text">${state.questionPrompt}</div>
            <div class="answer-grid">
              ${state.questionChoices.map((choice, idx) =>
                `<div class="answer-tile ${colors[idx]} ${idx === state.correctChoice ? "correct-highlight" : ""}">
                  ${idx === state.correctChoice ? "✓ " : ""}${labels[idx]}. ${choice}
                </div>`
              ).join("")}
            </div>
            <div class="bar-chart">
              ${tally.map((count, idx) => `
                <div class="bar-row">
                  <div class="bar-label">${labels[idx]}</div>
                  <div class="bar-track">
                    <div class="bar-fill ${colors[idx]}" style="width:${Math.round(count/maxTally*100)}%">
                      ${count > 0 ? count : ""}
                    </div>
                  </div>
                </div>`).join("")}
            </div>
            <div class="btn-row"><button class="ctrl-btn" id="lbBtn">Show Leaderboard</button></div>`;
          document.getElementById("lbBtn").onclick = advanceToLeaderboard;
        }

        function renderLeaderboard(group) {
          const state    = group[hostId];
          const standings = computeLeaderboard(group).slice(0, 10);
          const isLast   = state.questionIndex >= QUESTIONS.length - 1;
          view().innerHTML = `
            <h1 style="text-align:center;margin-bottom:16px">Leaderboard</h1>
            <ul class="leaderboard-list">
              ${standings.map((entry, idx) =>
                `<li><span class="rank">#${idx+1}</span><span>${escapeHtml(entry.name)}</span><span class="score">${entry.totalScore}</span></li>`
              ).join("")}
            </ul>
            <div class="btn-row">
              <button class="ctrl-btn" id="nextBtn">${isLast ? "Show Final Podium" : "Next Question"}</button>
            </div>`;
          document.getElementById("nextBtn").onclick = isLast ? advanceToEnded : advanceToNextQuestion;
        }

        function renderEnded(group) {
          const top3    = computeLeaderboard(group).slice(0, 3);
          const heights = [160, 120, 90];
          const order   = [1, 0, 2];
          view().innerHTML = `
            <h1 style="text-align:center;margin-bottom:8px">Game Over!</h1>
            <div class="podium">
              ${order.map(rank => {
                const entry = top3[rank];
                if (!entry) return "";
                return `<div class="podium-slot">
                  <div class="podium-name">${escapeHtml(entry.name)}</div>
                  <div class="podium-score">${entry.totalScore} pts</div>
                  <div class="podium-block" style="height:${heights[rank]}px">#${rank+1}</div>
                </div>`;
              }).join("")}
            </div>
            <div class="btn-row"><button class="ctrl-btn" id="endBtn">End Study</button></div>`;
          document.getElementById("endBtn").onclick = () => jatos.endStudy();
        }

        async function startGame() {
          const question = QUESTIONS[0];
          await adapter.push({
            role: "host", phase: PHASES.QUESTION, questionIndex: 0,
            questionPrompt: question.prompt, questionChoices: question.choices,
            questionStartTime: Date.now(), questionDurationMs: QUESTION_DURATION_MS,
            step: phaseStep(0, PHASES.QUESTION),
          });
        }
        async function advanceToReveal() {
          clearInterval(countdownInterval); countdownInterval = null;
          const state = currentGroup[hostId];
          await adapter.push({ ...state, phase: PHASES.REVEAL, correctChoice: QUESTIONS[state.questionIndex].correct, step: phaseStep(state.questionIndex, PHASES.REVEAL) });
        }
        async function advanceToLeaderboard() {
          const state = currentGroup[hostId];
          await adapter.push({ ...state, phase: PHASES.LEADERBOARD, step: phaseStep(state.questionIndex, PHASES.LEADERBOARD) });
        }
        async function advanceToNextQuestion() {
          const nextIndex = currentGroup[hostId].questionIndex + 1;
          const question  = QUESTIONS[nextIndex];
          clearInterval(countdownInterval); countdownInterval = null;
          await adapter.push({
            role: "host", phase: PHASES.QUESTION, questionIndex: nextIndex,
            questionPrompt: question.prompt, questionChoices: question.choices,
            questionStartTime: Date.now(), questionDurationMs: QUESTION_DURATION_MS,
            step: phaseStep(nextIndex, PHASES.QUESTION),
          });
        }
        async function advanceToEnded() {
          const state = currentGroup[hostId];
          await adapter.push({ ...state, phase: PHASES.ENDED, step: phaseStep(state.questionIndex, PHASES.ENDED) });
          // jatos.endStudy() is on the "End Study" button in renderEnded — don't call it here
          // or the study ends before renderEnded has a chance to show the podium.
        }
      }

      // ════════════════════════════════════════════════════════
      //  PLAYER FLOW — jsPsych timeline
      // ════════════════════════════════════════════════════════
      async function startPlayer() {
        document.getElementById("selector").style.display = "none";

        const jsPsych = initJsPsych({ on_finish: () => jatos.endStudy() });
        // Connect the network backend before running. Every multiplayer trial below talks to the
        // group session through this adapter; nothing about the timeline is JATOS-specific.
        await jsPsych.multiplayer.connect(new jsPsychAdapterMultiplayerJatos());

        let myName         = "";
        let hostId         = null;
        let myAnswers      = {};
        let myTotalScore   = 0;
        let lastQuestionIndex = -1;
        let lastChoice     = null;
        let lastTimeMs     = null;
        let lastPointsEarned = 0;
        let lastCorrect    = false;

        const nameTrial = {
          type: jsPsychHtmlKeyboardResponse,
          // oninput writes to a window var while the element still exists.
          // on_finish runs after the plugin clears innerHTML, so getElementById would return null.
          stimulus: `
            <p style="font-size:1.4rem;margin-bottom:16px">Enter your name:</p>
            <input id="nameInput" type="text" maxlength="20" autofocus
              oninput="window._playerName = this.value.trim()"
              style="font-size:1.3rem;padding:10px 16px;border-radius:8px;border:2px solid #ccc;width:240px;text-align:center" />
            <p style="margin-top:12px;opacity:0.6">Press Enter to join</p>`,
          choices: ["Enter"],
          on_finish: () => {
            myName = window._playerName || "Player";
            delete window._playerName;
          },
        };

        // ── Lobby ────────────────────────────────────────────────────────────────────────────────
        // The one push-then-wait barrier that publishes this player into the group session. It has
        // no `timeout` on purpose: waiting indefinitely for the host to press Start is correct
        // (see the note on the mid-game barriers below, where the tradeoff is different).
        const lobbyBarrier = {
          type: jsPsychMultiplayerSync,
          push_data: () => ({ role: "player", name: myName, answers: {}, totalScore: 0 }),
          wait_for: (group) => {
            const hId = getHostId(group);
            // Host has left the lobby (first question started, or further along for a late joiner).
            return hId !== null && hostStepValue(group) >= phaseStep(0, PHASES.QUESTION);
          },
          message: "<p style='font-size:1.2rem'>Waiting for the host to start…</p>",
          on_finish: (data) => { hostId = getHostId(data.group); },
        };

        const questionTrial = {
          type: jsPsychHtmlButtonResponse,
          stimulus: () => {
            const state = jsPsych.multiplayer.get(hostId);
            return `<p style="font-size:1.1rem;margin-bottom:4px;opacity:0.6">Question ${(state?.questionIndex ?? 0) + 1}</p>
                    <p style="font-size:1.4rem;font-weight:bold">${state?.questionPrompt ?? ""}</p>`;
          },
          choices: () => jsPsych.multiplayer.get(hostId)?.questionChoices ?? [],
          button_html: (choice, choiceIndex) => {
            const colors  = ["red","blue","yellow","green"];
            const labels  = ["A","B","C","D"];
            return `<button class="jspsych-btn answer-btn ${colors[choiceIndex]}">${labels[choiceIndex]}. ${choice}</button>`;
          },
          trial_duration: () => jsPsych.multiplayer.get(hostId)?.questionDurationMs ?? QUESTION_DURATION_MS,
          on_finish: async (data) => {
            const state       = jsPsych.multiplayer.get(hostId);
            lastQuestionIndex = state?.questionIndex ?? 0;
            lastChoice        = data.response;
            lastTimeMs        = data.response !== null
              ? Math.min(data.rt, state?.questionDurationMs ?? QUESTION_DURATION_MS)
              : state?.questionDurationMs ?? QUESTION_DURATION_MS;
            myAnswers         = { ...myAnswers, [lastQuestionIndex]: { choice: lastChoice, timeMs: lastTimeMs } };
            await jsPsych.multiplayer.push({ role: "player", name: myName, answers: myAnswers, totalScore: myTotalScore });
          },
        };

        const revealBarrier = {
          type: jsPsychMultiplayerSync,
          wait_for: (group) => hostStepValue(group) >= phaseStep(lastQuestionIndex, PHASES.REVEAL),
          message: "<p>Waiting for results…</p>",
          on_finish: (data) => {
            const state       = data.group[hostId];
            lastCorrect       = lastChoice !== null && lastChoice === state?.correctChoice;
            lastPointsEarned  = scoreAnswer(lastCorrect, lastTimeMs, state?.questionDurationMs ?? QUESTION_DURATION_MS);
            myTotalScore     += lastPointsEarned;
          },
        };

        const pushScoreTrial = {
          type: jsPsychCallFunction,
          async: true,
          func: async (done) => {
            await jsPsych.multiplayer.push({ role: "player", name: myName, answers: myAnswers, totalScore: myTotalScore });
            done();
          },
        };

        const revealDisplay = {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: () => {
            const state       = jsPsych.multiplayer.get(hostId);
            const correctText = state?.questionChoices?.[state?.correctChoice] ?? "";
            if (lastChoice === null) {
              return `<p class="result-wrong">Time's up!</p>
                      <p style="margin-top:8px">Correct: <strong>${correctText}</strong></p>
                      <p class="total-score">Total: ${myTotalScore} pts</p>`;
            }
            return lastCorrect
              ? `<p class="result-correct">Correct! ✓</p>
                 <p class="points-earned">+${lastPointsEarned} points</p>
                 <p class="total-score">Total: ${myTotalScore} pts</p>`
              : `<p class="result-wrong">Wrong</p>
                 <p style="margin-top:8px">Correct: <strong>${correctText}</strong></p>
                 <p class="total-score">Total: ${myTotalScore} pts</p>`;
          },
          choices: "NO_KEYS",
          trial_duration: 3000,
        };

        const leaderboardBarrier = {
          type: jsPsychMultiplayerSync,
          // ENDED has a step above any question, so it satisfies this too.
          wait_for: (group) => hostStepValue(group) >= phaseStep(lastQuestionIndex, PHASES.LEADERBOARD),
          message: "<p>Calculating scores…</p>",
        };

        const leaderboardDisplay = {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: () => {
            const standings      = computeLeaderboard(jsPsych.multiplayer.getAll());
            const myParticipantId = jsPsych.multiplayer.participantId;
            const myRank         = standings.findIndex(entry => entry.participantId === myParticipantId) + 1;
            const topThree       = standings.slice(0, 3)
              .map((entry, idx) => `<p style="font-size:1rem;opacity:0.8">#${idx+1} ${escapeHtml(entry.name)} — ${entry.totalScore} pts</p>`)
              .join("");
            return `<p style="font-size:1.4rem;font-weight:bold">You are #${myRank || "?"}</p>
                    <p style="font-size:1.2rem;margin-bottom:16px">${myTotalScore} points</p>
                    ${topThree}`;
          },
          choices: "NO_KEYS",
          trial_duration: 4000,
        };

        const nextQuestionBarrier = {
          type: jsPsychMultiplayerSync,
          // Wait for the *next* question to start (or the game to end).
          wait_for: (group) => hostStepValue(group) >= phaseStep(lastQuestionIndex + 1, PHASES.QUESTION),
          message: "<p>Get ready…</p>",
        };

        const questionLoop = {
          timeline: [questionTrial, revealBarrier, pushScoreTrial, revealDisplay, leaderboardBarrier, leaderboardDisplay, nextQuestionBarrier],
          loop_function: () => jsPsych.multiplayer.get(hostId)?.phase !== PHASES.ENDED,
        };

        const endScreen = {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: () => `
            <p style="font-size:2rem;font-weight:bold">Game Over!</p>
            <p style="font-size:1.3rem;margin-top:12px">Final score: <strong>${myTotalScore}</strong> pts</p>
            <p style="margin-top:8px;opacity:0.7">Thanks for playing!</p>`,
          choices: "NO_KEYS",
          trial_duration: 5000,
        };

        await jsPsych.run([nameTrial, lobbyBarrier, questionLoop, endScreen]);
      }

    }); // jatos.onLoad
    </script>
  </body>
</html>
