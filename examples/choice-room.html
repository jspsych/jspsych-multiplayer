<!DOCTYPE html>
<html>
  <head>
    <title>Multiplayer Choice Room (Prisoner's Dilemma) — jsPsych multiplayer</title>
    <!-- jsPsych core MUST carry the multiplayer API (jsPsych#3694), which is not yet in a release.
         Until it merges, load the PR's preview build from jsDelivr instead of the published `jspsych`.
         This URL is pinned to the same #3694 preview SHA as chat-room.html. A SHA-pinned URL keeps
         loading indefinitely (it never 404s); what goes stale is the #3694 API it was pinned against,
         so if the demo misbehaves against a newer #3694, re-pin — see examples/README.md "Running it". -->
    <script src="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@c43b3a1f285ef2d899cd43960c889a4a9d630dc9/packages/jspsych/dist/index.browser.min.js"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response"></script>
    <!-- The multiplayer packages resolve from the sibling packages' built dist/ in this repo (run
         `npm install && npm run build` from the repo root first — dist/ is gitignored). Once they are
         published, load them from a CDN instead, e.g.
           <script src="https://unpkg.com/@jspsych-multiplayer/plugin-multiplayer-choice"></script> -->
    <!-- The `?v=` query is a cache-buster: bump it after rebuilding the packages so the browser is
         forced to re-fetch the new bundle instead of serving a stale cached copy. -->
    <script src="../packages/adapter-multiplayer-local/dist/index.browser.min.js?v=1"></script>
    <script src="../packages/plugin-multiplayer-sync/dist/index.browser.min.js?v=1"></script>
    <script src="../packages/plugin-multiplayer-choice/dist/index.browser.min.js?v=1"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/jspsych/jsPsych@c43b3a1f285ef2d899cd43960c889a4a9d630dc9/packages/jspsych/css/jspsych.css"
    />
    <style>
      /* The choice plugin ships its own scoped stylesheet for the reveal list; this demo only adds a
         little spacing so the option buttons in the choosing phase aren't cramped. */
      .jspsych-multiplayer-choice-options {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 12px;
      }
      .jspsych-multiplayer-choice-prompt {
        font-size: 1.1em;
      }
      .choice-room-payoffs {
        margin: 8px auto 0;
        color: #555;
        font-size: 0.9em;
      }
    </style>
  </head>

  <body></body>
  <script>
    // ===============================================================================================
    // Multiplayer Choice Room — a Prisoner's Dilemma demo for the jsPsych multiplayer packages.
    //
    // Participants pick a display name, wait in a lobby until two players have joined, then
    // SIMULTANEOUSLY choose "Cooperate" or "Defect". The trial waits (a barrier) until both have
    // chosen, then reveals BOTH choices (unlike the anonymous vote demo, choice is attributed) and
    // each player's payoff from the classic PD matrix. It composes three packages:
    //   • adapter-multiplayer-local — the network backend. localStorage + cross-tab signalling, so the
    //                                 whole thing runs by OPENING TWO BROWSER TABS — no server.
    //   • plugin-multiplayer-sync   — the lobby: push your name, wait until EXPECTED_PLAYERS are present.
    //   • plugin-multiplayer-choice — the decision: everyone picks, the group barriers until all have
    //                                 chosen, then choices + payoffs are revealed. The `payoff` hook
    //                                 scores the round; here it implements the PD matrix.
    //
    // -----------------------------------------------------------------------------------------------
    // ILLUSTRATIVE example. Like chat-room.html it needs no server, but connecting ANY adapter still
    // requires the multiplayer API from jsPsych#3694, which is not yet in a release. The local adapter
    // is same-origin, same-browser, same-machine — a development/demo tool, NOT for data collection.
    // ===============================================================================================

    // This demo is designed for a FIXED number of players (a Prisoner's Dilemma needs exactly 2).
    // `expected_players` must be the same exact integer on every client, so it's a constant, NOT a
    // live head-count of whoever is present — a live count lets tabs that reach the barrier at
    // different moments wait for different totals and hang.
    const EXPECTED_PLAYERS = 2;

    // The two moves. Index 0 = Cooperate, index 1 = Defect (used by the payoff matrix below).
    const MOVES = ["Cooperate", "Defect"];

    // Classic Prisoner's Dilemma payoffs, in points. PAYOFFS[myMove][theirMove]:
    //   both cooperate -> 3 each;  both defect -> 1 each;
    //   I defect while they cooperate -> I get 5, they get 0 (the temptation).
    const PAYOFFS = [
      [3, 0], // I cooperated: they cooperated -> 3, they defected -> 0
      [5, 1], // I defected:   they cooperated -> 5, they defected -> 1
    ];

    const jsPsych = initJsPsych();

    // Connecting the adapter is the only network setup the timeline needs. persistParticipant keeps
    // this tab's participant id in sessionStorage, so a mid-lobby refresh rejoins as the SAME
    // participant instead of leaving a stale "ghost" slot that would falsely satisfy the lobby.
    const localAdapter = new jsPsychAdapterMultiplayerLocal({ persistParticipant: true });

    // The local adapter only removes this tab's slot on an explicit disconnect(); a CLOSED tab would
    // otherwise linger as a "ghost" slot that pollutes later runs. Clean up on close.
    window.addEventListener("pagehide", () => localAdapter.disconnect());

    // Only participants who made it through the lobby (i.e. pushed a `name`) count as "present".
    const namedPresent = (group) =>
      Object.values(group).filter((entry) => entry && entry.name).length;

    let myName = "";

    // 1) Ask for a display name.
    const nameTrial = {
      type: jsPsychSurveyText,
      preamble: `<div style="max-width:34em;margin:0 auto 1.2em;padding:0.8em 1em;border:1px solid #ccc;border-radius:8px;background:#f6f8fa;">
                   👥 <strong>This demo is designed for ${EXPECTED_PLAYERS} players</strong>.
                   Open this page in <strong>exactly ${EXPECTED_PLAYERS} browser tabs</strong> — copy the URL
                   (including <code>?mp_session=…</code>) into each new tab so they join the same session.
                 </div>`,
      questions: [{ prompt: "Choose a display name:", required: true, name: "name" }],
      on_finish: (data) => {
        myName = (data.response.name || "").trim() || "Anonymous";
      },
    };

    // 2) Lobby: publish our name + join time, then wait until both players are present.
    const lobbyTrial = {
      type: jsPsychMultiplayerSync,
      push_data: () => ({ name: myName, joinedAt: Date.now() }),
      // NB: the sync plugin's waiting-HTML parameter is `message`, not `prompt`.
      message: `<p>Waiting for ${EXPECTED_PLAYERS} players to join…</p>
               <p>Open this page in another tab (keep the <code>?mp_session=</code> in the URL) to add a player.</p>`,
      wait_for: (group) => namedPresent(group) >= EXPECTED_PLAYERS,
    };

    // Map a participant id to the display name it pushed in the lobby; our own id reads "You".
    const labelFor = (id) =>
      id === localAdapter.participantId
        ? "You"
        : (jsPsych.multiplayer.get(id) || {}).name || "The other player";

    // 3) The decision. Unlike the anonymous vote, choice attributes each pick to a player on the
    //    reveal (via `player_label`). `expected_players` is read dynamically from the players who made
    //    it through the lobby so the barrier waits for exactly who is present. The `payoff` hook scores
    //    the round with the PD matrix — it receives `{ participantId: { index, label } }` for everyone
    //    plus this client's id, and returns THIS client's points.
    const choiceTrial = {
      type: jsPsychMultiplayerChoice,
      choices: MOVES,
      prompt: "<p>Prisoner's Dilemma — do you <strong>Cooperate</strong> or <strong>Defect</strong>?</p>",
      expected_players: EXPECTED_PLAYERS,
      waiting_message: "<p>Your move is locked in — waiting for the other player…</p>",
      player_label: labelFor,
      payoff: (choices, me) => {
        const otherId = Object.keys(choices).find((id) => id !== me);
        if (!otherId) return 0; // no opponent recorded (e.g. a timeout) — no points
        return PAYOFFS[choices[me].index][choices[otherId].index];
      },
      reveal: true,
      reveal_prompt: "<h3>Both players have chosen</h3>",
      continue_label: "Continue",
    };

    // 4) Wrap-up screen: report both moves and this player's payoff from the choice trial's data.
    const doneTrial = {
      type: jsPsychHtmlButtonResponse,
      choices: ["Finish"],
      stimulus: () => {
        const c =
          jsPsych.data.get().filter({ trial_type: "multiplayer-choice" }).values()[0] || {};
        const byPlayer = c.choices_by_player || {};
        const me = localAdapter.participantId;
        const otherId = Object.keys(byPlayer).find((id) => id !== me);
        const myMove = (byPlayer[me] || {}).label ?? "—";
        const theirMove = otherId ? byPlayer[otherId].label : "—";
        return `<h2>Round over</h2>
                <p>You chose <strong>${myMove}</strong>; the other player chose <strong>${theirMove}</strong>.</p>
                <p>Your payoff: <strong>${c.my_payoff ?? "—"}</strong> point(s).</p>`;
      },
    };

    // Connect the backend, then run. Everything above is backend-agnostic — swapping the adapter on
    // the line below is the only change needed to move from local two-tab testing to JATOS.
    //
    // jsPsych.run() resolves once the timeline (including the "Finish" click on doneTrial) is fully
    // done; replace the display with an explicit "you can close this now" message so clicking Finish
    // doesn't just leave a blank screen.
    jsPsych.multiplayer.connect(localAdapter).then(() => {
      jsPsych.run([nameTrial, lobbyTrial, choiceTrial, doneTrial]).then(() => {
        jsPsych.getDisplayElement().innerHTML = `
          <h2>Demo complete</h2>
          <p>You can close this browser tab now.</p>`;
      });
    });
  </script>
</html>
