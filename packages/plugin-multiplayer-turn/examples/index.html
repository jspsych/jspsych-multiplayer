<!DOCTYPE html>
<html>
  <head>
    <title>jsPsychMultiplayerTurn Example</title>
    <script src="https://unpkg.com/jspsych"></script>
    <!-- Once this plugin package is published, load it from a CDN instead:
         <script src="https://unpkg.com/@jspsych-multiplayer/plugin-multiplayer-turn"></script> -->
    <script src="../dist/index.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css" />
  </head>

  <body></body>
  <script>
    // ---------------------------------------------------------------------------------------------
    // ILLUSTRATIVE example — it shows the intended API, it is NOT a self-contained demo.
    //
    // Turn-taking coordinates over a SHARED multiplayer group session, so to actually run it you need:
    //   1. the jsPsych multiplayer API (jsPsych#3694), which is not yet in a released jsPsych, and
    //   2. a connected network adapter plus several real participants in the same group.
    // It therefore cannot run from a single browser tab today.
    // ---------------------------------------------------------------------------------------------

    const jsPsych = initJsPsych();

    // 1. Connect a multiplayer adapter before running, e.g. the JATOS adapter:
    //      import JatosAdapter from "@jspsych-multiplayer/adapter-multiplayer-jatos";
    //      await jsPsych.pluginAPI.connect(new JatosAdapter());

    // 2. Take turns. Every client runs this ONE trial; the active player (first in the order who hasn't
    //    moved) sees a prompt + commit button, everyone else sees "waiting for X" and the moves so far.
    //    The trial ends for everyone once all turns are taken. The move VALUE comes from `get_move` —
    //    here, a decision the participant made in an earlier trial.
    const takeTurn = {
      type: jsPsychMultiplayerTurn,
      // The order of play. Sorted ids by default; here we take turns among our matched pair (seat 0
      // moves first), namespacing the session key per pair so two pairs don't count each other's moves.
      turn_order: () => jsPsychMultiplayerMatch.getMyMatch().members,
      data_key: () => "round_" + jsPsychMultiplayerMatch.getMyMatch().members.join("_"),
      prompt: "<p>It's your turn — click to lock in your move.</p>",
      get_move: () => jsPsych.data.get().last(1).values()[0].response, // decided just before
      format_move: (move) => String(move),
      timeout: 60000, // give up if a partner abandons the game
    };

    jsPsych.run([takeTurn]);
  </script>
</html>
