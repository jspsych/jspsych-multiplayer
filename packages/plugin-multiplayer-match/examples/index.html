<!DOCTYPE html>
<html>
  <head>
    <title>jsPsychMultiplayerMatch Example</title>
    <script src="https://unpkg.com/jspsych"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response"></script>
    <!-- Once this plugin package is published, load it from a CDN instead:
         <script src="https://unpkg.com/@jspsych-multiplayer/plugin-multiplayer-match"></script> -->
    <script src="../dist/index.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css" />
  </head>

  <body></body>
  <script>
    // ---------------------------------------------------------------------------------------------
    // ILLUSTRATIVE example — it shows the intended API, it is NOT a self-contained demo.
    //
    // Matching partitions a SHARED multiplayer group session, so to actually run it you need:
    //   1. the jsPsych multiplayer API (jsPsych#3694), which is not yet in a released jsPsych, and
    //   2. a connected network adapter plus several real participants in the same group.
    // It therefore cannot run from a single browser tab today.
    // ---------------------------------------------------------------------------------------------

    const jsPsych = initJsPsych();

    // 1. Connect a multiplayer adapter before running, e.g. the JATOS adapter:
    //      import JatosAdapter from "@jspsych-multiplayer/adapter-multiplayer-jatos";
    //      await jsPsych.pluginAPI.connect(new JatosAdapter());

    // 2. Pair everyone up. The trial waits until all `expected_players` are present, then EVERY client
    //    computes the SAME partition and learns its own partner(s) — no coordinator. `random` makes the
    //    pairing unpredictable-by-id while staying identical across clients.
    const match = {
      type: jsPsychMultiplayerMatch,
      expected_players: 8, // wait for all eight, then split into four pairs
      group_size: 2,
      strategy: "random",
    };

    // 3. A later trial reads this client's partner from the store the match published.
    const greetPartner = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: () => {
        const partner = jsPsychMultiplayerMatch.getMyPartners()[0];
        const seat = jsPsychMultiplayerMatch.getMyPosition(); // 0 or 1 — a natural role-within-pair
        return `<p>You're paired with <b>${partner}</b> (you are player ${seat + 1}). Press any key.</p>`;
      },
    };

    jsPsych.run([match, greetPartner]);
  </script>
</html>
