<!DOCTYPE html>
<html>
  <head>
    <title>jsPsychMultiplayerLiveScoreboard Example</title>
    <script src="https://unpkg.com/jspsych"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response"></script>
    <!-- Once this plugin package is published, load it from a CDN instead:
         <script src="https://unpkg.com/@jspsych-multiplayer/plugin-multiplayer-live-scoreboard"></script> -->
    <script src="../dist/index.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css" />
  </head>

  <body></body>
  <script>
    // ---------------------------------------------------------------------------------------------
    // ILLUSTRATIVE example — it shows the intended API, it is NOT a self-contained demo.
    //
    // The live scoreboard ranks over a SHARED multiplayer group session and re-renders as peers
    // report, so to actually run it you need:
    //   1. the jsPsych multiplayer API (jsPsych#3694), which is not yet in a released jsPsych, and
    //   2. a connected network adapter plus several real participants in the same group.
    // It therefore cannot run from a single browser tab today.
    //
    // NOTE: this is a STANDALONE trial screen that owns the display while it is open — it is NOT a
    // persistent overlay floating over your other trials. Show it as a lobby / intermission screen.
    // ---------------------------------------------------------------------------------------------

    const jsPsych = initJsPsych();

    // 1. Connect a multiplayer adapter before running, e.g. the JATOS adapter:
    //      import JatosAdapter from "@jspsych-multiplayer/adapter-multiplayer-jatos";
    //      await jsPsych.pluginAPI.connect(new JatosAdapter());

    // 2. ...run your game, accumulating a score in the data (e.g. one `points` field per trial)...

    // 3. Show the LIVE scoreboard. Each client contributes its own final score ONCE; the board then
    //    stays open and re-ranks in real time as the other players report — participants watch the
    //    standings fill in. Every client computes the SAME board and highlights its own row.
    const liveScoreboard = {
      type: jsPsychMultiplayerLiveScoreboard,
      // IMPORTANT: `score` is AUTO-DERIVED from this client's own prior trials — the participant does
      // NOT type it in. Here it is the sum of every `points` value collected earlier in the timeline.
      score: () => jsPsych.data.get().select("points").sum(),
      label: "You", // name shown on your own row
      sort: "desc", // highest score ranks first
      tie_method: "standard", // ties share a rank; the next distinct score skips
      title: "<h2>Live scores</h2>",
      expected_players: 4, // caption reads "N of 4 reported" as peers arrive (display only, no barrier)
      end_when: (group) => Object.keys(group).length >= 4, // close once all four have reported...
      end_button_label: "Continue", // ...or let a player move on early
    };

    // 4. Branch the timeline on the outcome. getMyRank() reads the standing the scoreboard stored,
    //    so downstream trials need not dig through the data record.
    const winnerScreen = {
      timeline: [
        {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: "<p>🏆 You won! Press any key to finish.</p>",
        },
      ],
      conditional_function: () => jsPsychMultiplayerLiveScoreboard.getMyRank() === 1,
    };

    const runnerUpScreen = {
      timeline: [
        {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: "<p>Thanks for playing! Press any key to finish.</p>",
        },
      ],
      conditional_function: () => jsPsychMultiplayerLiveScoreboard.getMyRank() !== 1,
    };

    jsPsych.run([liveScoreboard, winnerScreen, runnerUpScreen]);
  </script>
</html>
