<!DOCTYPE html>
<html>
  <head>
    <title>jsPsychMultiplayerReady Example</title>
    <script src="https://unpkg.com/jspsych"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response"></script>
    <!-- Once this plugin package is published, load it from a CDN instead:
         <script src="https://unpkg.com/@jspsych-multiplayer/plugin-multiplayer-ready"></script> -->
    <script src="../dist/index.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css" />
  </head>

  <body></body>
  <script>
    // ---------------------------------------------------------------------------------------------
    // ILLUSTRATIVE example — it shows the intended API, it is NOT a self-contained demo.
    //
    // A ready / check-in barrier operates over a SHARED multiplayer group session, so to run it you
    // need:
    //   1. the jsPsych multiplayer API (jsPsych#3694), which is not yet in a released jsPsych, and
    //   2. a connected network adapter plus several real participants in the same group.
    // It therefore cannot run from a single browser tab today. The full runnable, end-to-end demo
    // is the turn-based ultimatum-game example (forthcoming).
    // ---------------------------------------------------------------------------------------------

    const jsPsych = initJsPsych();

    // 1. Connect a multiplayer adapter before running, e.g. the JATOS adapter:
    //      import JatosAdapter from "@jspsych-multiplayer/adapter-multiplayer-jatos";
    //      await jsPsych.pluginAPI.connect(new JatosAdapter());

    // 2. A ready / check-in barrier (a "waiting room"): show a ready button, push this client's
    //    readiness into the shared group session, then hold on a waiting message until every
    //    expected participant has clicked ready.
    const readyGate = {
      type: jsPsychMultiplayerReady,
      expected_players: 2, // total group size, including this participant
      stimulus: "<p>You'll be matched with another player. Click when you're ready.</p>",
      waiting_message: "<p>Waiting for the other player to check in…</p>",
      timeout: 120000, // give up after 2 minutes of waiting for the other player
      on_timeout: () => console.warn("The other player didn't check in."),
    };

    // 3. Once everyone has checked in, every client proceeds together — in lock-step.
    const start = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "<p>Everyone's ready! Press any key to begin.</p>",
    };

    // With an adapter connected this would be: await jsPsych.run([...]);
    jsPsych.run([readyGate, start]);
  </script>
</html>
