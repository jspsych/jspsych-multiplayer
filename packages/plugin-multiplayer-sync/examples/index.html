<!DOCTYPE html>
<html>
  <head>
    <title>jsPsychMultiplayerSync Example</title>
    <script src="https://unpkg.com/jspsych"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response"></script>
    <!-- Once this plugin package is published, load it from a CDN instead:
         <script src="https://unpkg.com/@jspsych-multiplayer/plugin-multiplayer-sync"></script> -->
    <script src="../dist/index.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css" />
  </head>

  <body></body>
  <script>
    // ---------------------------------------------------------------------------------------------
    // ILLUSTRATIVE example — it shows the intended API, it is NOT a self-contained demo.
    //
    // A synchronization barrier operates over a SHARED multiplayer group session, so to run it you
    // need:
    //   1. the jsPsych multiplayer API (jsPsych#3694), which is not yet in a released jsPsych, and
    //   2. a connected network adapter plus several real participants in the same group.
    // It therefore cannot run from a single browser tab today. The full runnable, end-to-end demo
    // is the turn-based ultimatum-game example (forthcoming).
    // ---------------------------------------------------------------------------------------------

    const jsPsych = initJsPsych();

    // 1. Connect a multiplayer adapter before running, e.g. the JATOS adapter:
    //      import JatosAdapter from "@jspsych-multiplayer/adapter-multiplayer-jatos";
    //      await jsPsych.pluginAPI.connect(new JatosAdapter());

    // 2. A synchronization barrier (a "waiting room"): push this client's readiness into the shared
    //    group session, show a waiting message, and end the trial only once every expected
    //    participant has arrived. `wait_for` is the same predicate you would pass to pluginAPI.wait().
    const lobby = {
      type: jsPsychMultiplayerSync,
      push_data: { ready: true },
      wait_for: (group) => Object.keys(group).length >= 2, // hold until both players are present
      message: "<p>Waiting for the other player to join…</p>",
      timeout: 60000, // give up after 60s
      on_timeout: () => console.warn("No other players joined in time."),
    };

    // 3. Once the barrier clears, every client proceeds together — in lock-step.
    const start = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "<p>Everyone's here! Press any key to begin.</p>",
    };

    // With an adapter connected this would be: await jsPsych.run([...]);
    jsPsych.run([lobby, start]);
  </script>
</html>
