<!DOCTYPE html>
<html>
  <head>
    <title>jsPsychMultiplayerChoice Example</title>
    <script src="https://unpkg.com/jspsych"></script>
    <!-- Once this plugin package is published, load it from a CDN instead:
         <script src="https://unpkg.com/@jspsych-multiplayer/plugin-multiplayer-choice"></script> -->
    <script src="../dist/index.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css" />
  </head>

  <body></body>
  <script>
    // ---------------------------------------------------------------------------------------------
    // ILLUSTRATIVE example — it shows the intended API, it is NOT a self-contained demo.
    //
    // The choice trial collects a decision over a SHARED multiplayer group session and barriers on
    // the whole group, so to actually run it you need:
    //   1. the jsPsych multiplayer API (jsPsych#3694), which is not yet in a released jsPsych, and
    //   2. a connected network adapter plus several real participants in the same group.
    // It therefore cannot run from a single browser tab today.
    // ---------------------------------------------------------------------------------------------

    const jsPsych = initJsPsych();

    // 1. Connect a multiplayer adapter before running, e.g. the JATOS adapter:
    //      import JatosAdapter from "@jspsych-multiplayer/adapter-multiplayer-jatos";
    //      await jsPsych.pluginAPI.connect(new JatosAdapter());

    // 2. A one-shot prisoner's dilemma. Every player picks simultaneously; the trial waits until BOTH
    //    have chosen, then reveals both choices and (via the optional payoff hook) each player's score.
    const prisonersDilemma = {
      type: jsPsychMultiplayerChoice,
      prompt: "<p>You and your partner choose at the same time. Choose wisely.</p>",
      choices: ["Cooperate", "Defect"],
      expected_players: 2, // wait for both players before revealing
      reveal_prompt: "<h3>Both players have chosen</h3>",
      // Optional: score the round. Leave `payoff` off to keep this a pure decision primitive and
      // compute payoffs yourself from `choices_by_player` in on_finish.
      payoff: (choices, me) => {
        const mine = choices[me].index; // 0 = Cooperate, 1 = Defect
        const other = Object.entries(choices).find(([id]) => id !== me)[1].index;
        const T = [
          [3, 0], // I cooperate: both-cooperate = 3, I'm suckered = 0
          [5, 1], // I defect:    I exploit = 5,      both-defect = 1
        ];
        return T[mine][other];
      },
    };

    // 3. An anonymous group poll (tally mode). Every player picks; the trial waits until all four
    //    have chosen, then reveals only the per-option counts and the plurality winner — never who
    //    chose what. `record_choices_by_player: false` keeps the recorded data anonymous too.
    const nextGame = {
      type: jsPsychMultiplayerChoice,
      prompt: "<p>Which game should the group play next? Majority wins.</p>",
      choices: ["Trust", "Ultimatum", "Public goods"],
      expected_players: 4,
      reveal_mode: "tally",
      record_choices_by_player: false,
      reveal_prompt: "<h3>The votes are in</h3>",
      on_finish: (data) => {
        // winner is null on a tie — decide however you like (here: keep a default and branch later).
        data.next_game = data.winner ? data.winner.label : "Public goods";
      },
    };

    // 4. Branch on the outcome using the saved data in a normal on_finish / conditional_function.
    jsPsych.run([prisonersDilemma, nextGame]);
  </script>
</html>
