name: Publish docs site

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/publish-docs.yml"
  # Build (but do not deploy) on PRs touching the site, so a broken docs build is
  # caught in review rather than after merge.
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/publish-docs.yml"
  workflow_dispatch:

env:
  HUSKY: 0

permissions:
  contents: read

concurrency:
  group: publish-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      # fetch-depth: 0 because `showLastUpdateTime` reads each page's last commit
      # from git history; a shallow clone dates every page to the same commit.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: website/build

  # The ref guard matters for `workflow_dispatch`, which is not branch-restricted:
  # without it, dispatching this workflow from any branch would publish that branch
  # to multiplayer.jspsych.org. Manual redeploys of `main` still work.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
