name: release

env:
  HUSKY: 0

on:
  push:
    branches:
      - main

permissions:
  contents: read

# This workflow only opens/updates the "Version Packages" pull request. Publishing to npm is
# handled separately by publish.yml, which uses npm trusted publishing (OIDC) and therefore needs
# a dedicated job with `id-token: write` and no long-lived NPM_TOKEN.
jobs:
  release:
    name: Create Release Pull Request
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1

      - name: Setup Node.js 24.x
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 #v7.0.0
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --ci --maxWorkers=2
        env:
          NODE_OPTIONS: "--max-old-space-size=4096" # Increase heap size for jest

      - name: Create Release Pull Request
        uses: changesets/action@41adcfa1f4c9a2f03ee74a426a8878a2b8cf7b85 # master
        with:
          version: npm run changeset:version
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
